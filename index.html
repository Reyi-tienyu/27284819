<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日翊庫存管理系統</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #F0F4FF;
      color: #1e293b;
      min-height: 100vh;
    }

    header {
      background: #1E40AF;
      color: white;
      padding: 20px 32px;
      box-shadow: 0 2px 8px rgba(30,64,175,0.25);
    }
    header h1 { font-size: 1.6rem; letter-spacing: 1px; }
    header p { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }

    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .card h2 {
      font-size: 1.05rem;
      color: #1E40AF;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #bfdbfe;
    }

    /* 警示區塊 */
    .alert-card {
      background: #fff5f5;
      border: 1.5px solid #fca5a5;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(220,38,38,0.07);
    }
    .alert-card h2 {
      font-size: 1.05rem;
      color: #dc2626;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #fecaca;
    }
    .alert-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .alert-chip {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.83rem;
      font-weight: 600;
    }

    .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
    .form-group label { font-size: 0.82rem; color: #555; font-weight: 600; }
    .form-group input {
      padding: 9px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus { outline: none; border-color: #2563eb; }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #1E40AF; color: white; align-self: flex-end; }
    .btn-primary:hover { background: #1e3a8a; }
    .btn-success {
      background: transparent;
      color: #16a34a;
      border: 1px solid #86efac;
      padding: 5px 11px;
      font-size: 0.8rem;
    }
    .btn-success:hover { background: #f0fdf4; }
    .btn-warning {
      background: transparent;
      color: #d97706;
      border: 1px solid #fcd34d;
      padding: 5px 11px;
      font-size: 0.8rem;
    }
    .btn-warning:hover { background: #fffbeb; }
    .btn-danger {
      background: transparent;
      color: #dc2626;
      border: 1px solid #fca5a5;
      padding: 5px 11px;
      font-size: 0.8rem;
    }
    .btn-danger:hover { background: #fef2f2; }
    .btn-export {
      background: #3B82F6;
      color: white;
      padding: 8px 18px;
      font-size: 0.88rem;
    }
    .btn-export:hover { background: #2563eb; }

    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .search-box {
      flex: 1;
      min-width: 180px;
      padding: 9px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .search-box:focus { outline: none; border-color: #2563eb; }

    .stats {
      display: flex;
      gap: 8px;
      font-size: 0.82rem;
      color: #6b7280;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-low { background: #fef2f2; color: #dc2626; }
    .badge-ok  { background: #f0fdf4; color: #16a34a; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead th {
      background: #dbeafe;
      color: #1E40AF;
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      border-bottom: 2px solid #93c5fd;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { background: #bfdbfe; }
    thead th .sort-icon { margin-left: 4px; opacity: 0.5; font-size: 0.75rem; }
    thead th.sort-asc .sort-icon::after  { content: ' ▲'; opacity: 1; }
    thead th.sort-desc .sort-icon::after { content: ' ▼'; opacity: 1; }
    thead th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: ' ⇅'; }
    /* 斑馬紋（非低庫存列） */
    tbody tr.row-normal:nth-child(even) { background: #f8fafc; }
    tbody tr.row-normal:nth-child(odd)  { background: #ffffff; }
    tbody tr.row-normal:hover { background: #eff6ff; }
    /* 低庫存整列紅底 */
    tbody tr.row-low { background: #fef2f2 !important; }
    tbody tr.row-low:hover { background: #fee2e2 !important; }

    tbody tr { transition: background 0.15s; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid #e5e7eb; vertical-align: middle; }

    .qty-low { color: #dc2626; font-weight: 700; }
    .qty-ok  { color: #16a34a; font-weight: 600; }

    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #9ca3af;
      font-size: 0.95rem;
    }
    .empty span { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 14px;
      padding: 28px 32px;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .modal h3 { font-size: 1.05rem; color: #1e40af; margin-bottom: 16px; }
    .modal-row { display: flex; gap: 10px; margin-top: 16px; }
    .modal input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
    }
    .modal input:focus { outline: none; border-color: #2563eb; }
    .btn-cancel {
      background: #f1f5f9;
      color: #475569;
      border: none;
    }
    .btn-cancel:hover { background: #e2e8f0; }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1e293b;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1100;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>📦 日翊庫存管理系統</h1>
  <p>所有資料自動儲存於本機，重新整理不會遺失</p>
</header>

<div class="container">

  <!-- 庫存不足警示 -->
  <div class="alert-card" id="alert-section" style="display:none">
    <h2>⚠️ 庫存不足警示</h2>
    <div class="alert-list" id="alert-list"></div>
  </div>

  <!-- 新增表單 -->
  <div class="card">
    <h2>新增商品</h2>
    <div class="form-row">
      <div class="form-group" style="flex:2">
        <label for="inp-name">商品名稱</label>
        <input type="text" id="inp-name" placeholder="例：衛生紙">
      </div>
      <div class="form-group">
        <label for="inp-qty">目前數量</label>
        <input type="number" id="inp-qty" placeholder="500" min="0">
      </div>
      <div class="form-group">
        <label for="inp-min">最低庫存量</label>
        <input type="number" id="inp-min" placeholder="100" min="0">
      </div>
      <button class="btn btn-primary" onclick="addProduct()">＋ 新增</button>
    </div>
  </div>

  <!-- 列表 -->
  <div class="card">
    <h2>商品庫存列表</h2>
    <div class="toolbar">
      <input class="search-box" type="text" id="search" placeholder="🔍 搜尋商品名稱…" oninput="renderTable()">
      <div class="stats" id="stats"></div>
      <button class="btn btn-export" onclick="exportCSV()">⬇️ 匯出 CSV</button>
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('index')">#<span class="sort-icon"></span></th>
          <th onclick="sortBy('name')">商品名稱<span class="sort-icon"></span></th>
          <th onclick="sortBy('qty')">目前數量<span class="sort-icon"></span></th>
          <th onclick="sortBy('min')">最低庫存量<span class="sort-icon"></span></th>
          <th onclick="sortBy('status')">狀態<span class="sort-icon"></span></th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="empty" id="empty-msg" style="display:none">
      <span>🗂️</span>尚無商品，請從上方新增
    </div>
  </div>

</div>

<!-- 進貨/出貨 Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">進貨</h3>
    <p id="modal-desc" style="font-size:0.85rem;color:#6b7280;margin-bottom:4px"></p>
    <div class="modal-row">
      <input type="number" id="modal-qty" placeholder="輸入數量" min="1">
    </div>
    <div class="modal-row">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modal-confirm" onclick="confirmModal()">確認</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 自動補貨建議 -->
<div class="container">
  <div class="card" id="reorder-card" style="display:none">
    <h2>🛒 自動補貨建議</h2>
    <table>
      <thead>
        <tr>
          <th>商品名稱</th>
          <th>目前數量</th>
          <th>最低庫存量</th>
          <th>建議補貨數量</th>
        </tr>
      </thead>
      <tbody id="reorder-body"></tbody>
    </table>
  </div>
</div>

<footer style="text-align:center;padding:20px 0 28px;font-size:0.78rem;color:#93c5fd;letter-spacing:0.3px;">
  Powered by Claude Code — 日翊 AI 內訓 2026/4/23
</footer>

<script>
  const STORAGE_KEY = 'inventory_v1';
  let modalState = null;
  let sortState = { key: null, dir: 'asc' };

  function sortBy(key) {
    if (sortState.key === key) {
      sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
    } else {
      sortState.key = key;
      sortState.dir = 'asc';
    }
    renderTable();
  }

  function applySorting(arr) {
    if (!sortState.key) return arr;
    const { key, dir } = sortState;
    return [...arr].sort((a, b) => {
      let va, vb;
      if (key === 'name')   { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
      else if (key === 'qty')    { va = a.qty; vb = b.qty; }
      else if (key === 'min')    { va = a.min; vb = b.min; }
      else if (key === 'status') { va = a.qty < a.min ? 0 : 1; vb = b.qty < b.min ? 0 : 1; }
      else return 0;
      if (va < vb) return dir === 'asc' ? -1 : 1;
      if (va > vb) return dir === 'asc' ?  1 : -1;
      return 0;
    });
  }

  function updateSortHeaders() {
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
    });
    if (!sortState.key) return;
    const map = { index: 0, name: 1, qty: 2, min: 3, status: 4 };
    const idx = map[sortState.key];
    if (idx === undefined) return;
    const th = document.querySelectorAll('thead th')[idx];
    if (th) th.classList.add(sortState.dir === 'asc' ? 'sort-asc' : 'sort-desc');
  }

  function load() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
  function save(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  /* ── 新增商品 ── */
  function addProduct() {
    const name = document.getElementById('inp-name').value.trim();
    const qty  = parseInt(document.getElementById('inp-qty').value);
    const min  = parseInt(document.getElementById('inp-min').value);

    if (!name) { showToast('⚠️ 請輸入商品名稱'); return; }
    if (isNaN(qty) || qty < 0) { showToast('⚠️ 請輸入有效的目前數量'); return; }
    if (isNaN(min) || min < 0) { showToast('⚠️ 請輸入有效的最低庫存量'); return; }

    const data = load();
    data.push({ id: Date.now(), name, qty, min });
    save(data);

    document.getElementById('inp-name').value = '';
    document.getElementById('inp-qty').value  = '';
    document.getElementById('inp-min').value  = '';
    document.getElementById('inp-name').focus();

    showToast('✅ 已新增：' + name);
    renderTable();
    renderReorder();
  }

  /* ── 刪除商品 ── */
  function deleteProduct(id) {
    const data = load().filter(p => p.id !== id);
    save(data);
    renderTable();
    renderReorder();
    showToast('🗑️ 已刪除商品');
  }

  /* ── 進貨 / 出貨 Modal ── */
  function openModal(id, type) {
    const data = load();
    const p = data.find(x => x.id === id);
    if (!p) return;
    modalState = { id, type };

    document.getElementById('modal-title').textContent =
      type === 'in' ? `📥 進貨：${p.name}` : `📤 出貨：${p.name}`;
    document.getElementById('modal-desc').textContent =
      `目前庫存：${p.qty.toLocaleString()}　最低庫存：${p.min.toLocaleString()}`;
    document.getElementById('modal-qty').value = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(() => document.getElementById('modal-qty').focus(), 80);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalState = null;
  }

  function confirmModal() {
    if (!modalState) return;
    const delta = parseInt(document.getElementById('modal-qty').value);
    if (isNaN(delta) || delta <= 0) { showToast('⚠️ 請輸入大於 0 的數量'); return; }

    const data = load();
    const p = data.find(x => x.id === modalState.id);
    if (!p) { closeModal(); return; }

    if (modalState.type === 'in') {
      p.qty += delta;
      showToast(`📥 進貨 ${delta}，${p.name} 現有 ${p.qty}`);
    } else {
      if (delta > p.qty) { showToast('⚠️ 出貨數量不可超過現有庫存'); return; }
      p.qty -= delta;
      showToast(`📤 出貨 ${delta}，${p.name} 現有 ${p.qty}`);
    }

    save(data);
    closeModal();
    renderTable();
    renderReorder();
  }

  /* ── 匯出 CSV ── */
  function exportCSV() {
    const data = load();
    if (data.length === 0) { showToast('⚠️ 尚無資料可匯出'); return; }

    const BOM = '\uFEFF';
    const header = '商品名稱,目前數量,最低庫存量,狀態';
    const rows = data.map(p =>
      `"${p.name.replace(/"/g,'""')}",${p.qty},${p.min},${ p.qty < p.min ? '庫存不足' : '正常' }`
    );
    const csv = BOM + [header, ...rows].join('\r\n');

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `庫存清單_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ CSV 已匯出');
  }

  /* ── 渲染表格 ── */
  function renderTable() {
    const keyword  = document.getElementById('search').value.trim().toLowerCase();
    const all      = load();
    const base     = keyword ? all.filter(p => p.name.toLowerCase().includes(keyword)) : all;
    const filtered = applySorting(base);

    const tbody  = document.getElementById('table-body');
    const empty  = document.getElementById('empty-msg');
    const stats  = document.getElementById('stats');

    // 警示區塊（用全部資料，不受搜尋過濾）
    const lowAll = all.filter(p => p.qty < p.min);
    const alertSec  = document.getElementById('alert-section');
    const alertList = document.getElementById('alert-list');
    if (lowAll.length > 0) {
      alertSec.style.display = 'block';
      alertList.innerHTML = lowAll.map(p =>
        `<span class="alert-chip">⚠️ ${escHtml(p.name)}（剩 ${p.qty}，最低 ${p.min}）</span>`
      ).join('');
    } else {
      alertSec.style.display = 'none';
    }

    updateSortHeaders();
    tbody.innerHTML = '';

    if (filtered.length === 0) {
      empty.style.display = 'block';
      stats.innerHTML = '';
    } else {
      empty.style.display = 'none';
      const lowCount = filtered.filter(p => p.qty < p.min).length;
      stats.innerHTML = `共 <strong>${filtered.length}</strong> 筆
        ${ lowCount > 0
          ? `｜<span class="badge badge-low">⚠️ 不足 ${lowCount} 項</span>`
          : `<span class="badge badge-ok">✓ 庫存正常</span>` }`;

      filtered.forEach((p, i) => {
        const isLow = p.qty < p.min;
        const tr = document.createElement('tr');
        tr.className = isLow ? 'row-low' : 'row-normal';
        tr.innerHTML = `
          <td style="color:#9ca3af">${i + 1}</td>
          <td><strong>${escHtml(p.name)}</strong></td>
          <td class="${isLow ? 'qty-low' : 'qty-ok'}">${p.qty.toLocaleString()}</td>
          <td style="color:#6b7280">${p.min.toLocaleString()}</td>
          <td>${isLow
            ? '<span class="badge badge-low">⚠️ 不足</span>'
            : '<span class="badge badge-ok">✓ 正常</span>'}</td>
          <td>
            <div class="actions">
              <button class="btn btn-success" onclick="openModal(${p.id},'in')">📥 進貨</button>
              <button class="btn btn-warning" onclick="openModal(${p.id},'out')">📤 出貨</button>
              <button class="btn btn-danger"  onclick="deleteProduct(${p.id})">刪除</button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
  }

  function renderReorder() {
    const all  = load();
    const low  = all.filter(p => p.qty < p.min);
    const card = document.getElementById('reorder-card');
    const tbody = document.getElementById('reorder-body');

    if (low.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    tbody.innerHTML = '';

    low.forEach(p => {
      const suggested = '計算中...'; // bug：應為 p.min * 2 - p.qty
      const tr = document.createElement('tr');
      tr.className = 'row-low';
      tr.innerHTML = `
        <td><strong>${escHtml(p.name)}</strong></td>
        <td class="qty-low">${p.qty.toLocaleString()}</td>
        <td>${p.min.toLocaleString()}</td>
        <td style="color:#1E40AF;font-weight:700">${suggested}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* Enter 換欄 */
  document.getElementById('inp-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-qty').focus();
  });
  document.getElementById('inp-qty').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-min').focus();
  });
  document.getElementById('inp-min').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProduct();
  });
  document.getElementById('modal-qty').addEventListener('keydown', e => {
    if (e.key === 'Enter') confirmModal();
    if (e.key === 'Escape') closeModal();
  });
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  });

  renderTable();
  renderReorder();
</script>
</body>
</html>
